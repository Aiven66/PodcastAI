<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self' 'unsafe-inline' 'unsafe-eval' https: data: blob:; media-src 'self' https: blob: data:;">
  <title>PodcastAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            primary: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              200: '#99f6e4',
              300: '#5eead4',
              400: '#2dd4bf',
              500: '#14b8a6',
              600: '#0d9488',
              700: '#0f766e',
              800: '#115e59',
              900: '#134e4a',
            },
          },
          fontFamily: {
            sans: ['ui-sans-serif', 'system-ui', '-apple-system', 'BlinkMacSystemFont', 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 'sans-serif'],
            serif: ['Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', 'Georgia', 'serif'],
          },
          borderRadius: {
            'xl': '0.8rem',
            '2xl': '1.2rem',
            '3xl': '1.6rem',
          },
        },
      },
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.cn/css2?family=Noto+Serif+SC:wght@400;500;600;700&display=swap');

    * { -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; }
    body {
      background: #fafaf9;
      color: #1c1917;
      font-family: 'Noto Serif SC', 'Songti SC', 'STSong', 'SimSun', Georgia, serif;
      overflow: hidden;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #d6d3d1; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #a8a29e; }
    .app-drag { -webkit-app-region: drag; }
    .app-no-drag { -webkit-app-region: no-drag; }
    .toast-enter { animation: toastIn 0.3s ease-out; }
    @keyframes toastIn { from { transform: translateY(-20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    .pulse-dot { animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .wave { display: inline-block; width: 3px; height: 14px; margin: 0 1px; background: currentColor; border-radius: 2px; animation: wave 1.2s ease-in-out infinite; }
    @keyframes wave { 0%, 100% { height: 6px; } 50% { height: 16px; } }
    .gradient-text {
      background: linear-gradient(to right, #0d9488, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .glow {
      position: absolute;
      border-radius: 9999px;
      filter: blur(80px);
      opacity: 0.3;
      pointer-events: none;
    }
  </style>
</head>
<body>
  <div id="app" class="flex h-screen"></div>

  <!-- Toast container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2 pointer-events-none"></div>

  <!-- Audio element (reused) -->
  <audio id="hidden-audio" class="hidden"></audio>

  <script>
    // 引用全局对象
    window.__podcastai = {
      state: {
        locale: 'zh',
        serviceUrl: 'http://localhost:8907',
        serviceTimeout: 60,
        serviceStatus: 'unknown',
        activeView: 'podcast',
        inputMethod: 'url',
        podcastType: 'single',
        voice1: 'female-professional',
        voice2: 'male-narrator',
        clones: [],
        history: [],
        isGenerating: false,
        isCloning: false,
        currentPodcast: null,
        progress: { current: 0, total: 0, stage: '' },
        scriptText: '',
        audioUrl: null,
      },
    }
  </script>

  <!-- Main app script (bundled) -->
  <script src="./renderer.js"></script>
</body>
</html>
